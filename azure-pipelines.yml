name: Azure_Infra_Lifecycle_$(Date:yyyyMMdd).$(Rev:r)

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  serviceConnection: 'Azure-Conn'

stages:
- stage: Deploy_and_Cleanup
  jobs:
  - job: Terraform_Workflow
    steps:
    - checkout: self

    # 1. Install Terraform via Linux Script
    - bash: |
        sudo apt-get update && sudo apt-get install -y gnupg software-properties-common
        wget -O- https://apt.releases.hashicorp.com/gpg | gpg --dearmor | sudo tee /usr/share/keyrings/hashicorp-archive-keyring.gpg
        echo "deb [signed-by=/usr/share/keyrings/hashicorp-archive-keyring.gpg] https://apt.releases.hashicorp.com $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/hashicorp.list
        sudo apt-get update && sudo apt-get install terraform
      displayName: 'Install Terraform CLI'

    # 2. Terraform Init and Apply using the Azure CLI Task
    # This task handles the login for you automatically!
    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          # These variables are automatically provided by the AzureCLI task
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          terraform init -backend=false
          terraform apply -auto-approve
          
          echo "Infrastructure is LIVE. Waiting 2 minutes for manual verification..."
          sleep 120

    # 3. Terraform Destroy (Safety Cleanup)
    - task: AzureCLI@2
      displayName: 'Terraform Cleanup'
      condition: always()
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          export ARM_CLIENT_ID=$servicePrincipalId
          export ARM_CLIENT_SECRET=$servicePrincipalKey
          export ARM_TENANT_ID=$tenantId
          export ARM_SUBSCRIPTION_ID=$(az account show --query id -o tsv)

          terraform destroy -auto-approve